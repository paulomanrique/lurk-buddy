appId: com.lurkbuddy.app
productName: Lurk Buddy
copyright: Copyright © 2024
artifactName: Lurk-Buddy-${version}-${arch}.${ext}

directories:
  buildResources: build
  output: release

files:
  - dist/**
  - package.json

extraResources:
  - from: .env
    to: .env
  - from: build/icon.png
    to: icons/app-icon.png

asar: true

mac:
  icon: build/icon.icns
  category: public.app-category.utilities
  notarize: true
  target:
    - target: dmg

win:
  icon: build/icon.png
  target:
    - target: nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: build/icons
  category: Utility
  target:
    - target: AppImage
