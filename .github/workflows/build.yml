name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — builds both x64 and arm64 from Intel runner
          - os: macos-13
            platform: mac
            arch_flag: ''

          # Windows — builds both x64 and arm64 from x64 runner
          - os: windows-latest
            platform: win
            arch_flag: ''

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch_flag: '--x64'

          # Linux arm64 — native ARM runner
          - os: ubuntu-24.04-arm
            platform: linux
            arch_flag: '--arm64'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env with secrets
        shell: bash
        run: |
          printf 'TWITCH_CLIENT_ID=%s\nTWITCH_CLIENT_SECRET=%s\nKICK_CLIENT_ID=%s\nKICK_CLIENT_SECRET=%s\n' \
            "$TWITCH_CLIENT_ID" "$TWITCH_CLIENT_SECRET" "$KICK_CLIENT_ID" "$KICK_CLIENT_SECRET" > .env
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          KICK_CLIENT_ID: ${{ secrets.KICK_CLIENT_ID }}
          KICK_CLIENT_SECRET: ${{ secrets.KICK_CLIENT_SECRET }}

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch_flag }}
        env:
          # Disable code signing — add certs here later if needed
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lurk-buddy-${{ matrix.platform }}-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          draft: true
          generate_release_notes: true
