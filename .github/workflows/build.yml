name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — macos-latest is Apple Silicon, can cross-compile x64
          - os: macos-latest
            platform: mac
            arch: arm64
            arch_flag: '--arm64'
            artifact_glob: release/*.dmg

          - os: macos-latest
            platform: mac
            arch: x64
            arch_flag: '--x64'
            artifact_glob: release/*.dmg

          # Windows x64 + arm64 (cross-compiled)
          - os: windows-latest
            platform: win
            arch: x64
            arch_flag: '--x64'
            artifact_glob: release/*.exe

          - os: windows-latest
            platform: win
            arch: arm64
            arch_flag: '--arm64'
            artifact_glob: release/*.exe

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            arch_flag: '--x64'
            artifact_glob: release/*.AppImage

          # Linux arm64 — native ARM runner
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            arch_flag: '--arm64'
            artifact_glob: release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            python3 \
            make \
            g++

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Create .env with secrets
        shell: bash
        run: |
          echo "TWITCH_CLIENT_ID=$TWITCH_CLIENT_ID" >> .env
          echo "TWITCH_CLIENT_SECRET=$TWITCH_CLIENT_SECRET" >> .env
          echo "KICK_CLIENT_ID=$KICK_CLIENT_ID" >> .env
          echo "KICK_CLIENT_SECRET=$KICK_CLIENT_SECRET" >> .env
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          KICK_CLIENT_ID: ${{ secrets.KICK_CLIENT_ID }}
          KICK_CLIENT_SECRET: ${{ secrets.KICK_CLIENT_SECRET }}

      - name: Build
        run: npm run build

      - name: Prepare macOS signing
        if: matrix.platform == 'mac'
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -n "$MACOS_CERTIFICATE_P12" ] && [ -n "$MACOS_CERTIFICATE_PASSWORD" ]; then
            {
              echo "CSC_LINK<<EOF"
              echo "$MACOS_CERTIFICATE_P12"
              echo "EOF"
              echo "CSC_KEY_PASSWORD=$MACOS_CERTIFICATE_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

          if [ -n "$APPLE_API_KEY_CONTENT" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$API_KEY_PATH"
            chmod 600 "$API_KEY_PATH"
            {
              echo "APPLE_API_KEY=$API_KEY_PATH"
              echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            } >> "$GITHUB_ENV"
          fi

      - name: Package
        run: npm run clean:release && npm exec electron-builder -- --${{ matrix.platform }} ${{ matrix.arch_flag }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lurk-buddy-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)
          if [ -z "$ASSETS" ]; then
            exit 0
          fi
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            gh release delete-asset "$TAG" "$asset" --yes
          done <<EOF
          $ASSETS
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          draft: true
          generate_release_notes: true
