name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — macos-latest is Apple Silicon, can cross-compile x64
          - os: macos-latest
            platform: mac
            arch_flag: ''

          # Windows x64 + arm64 (cross-compiled)
          - os: windows-latest
            platform: win
            arch_flag: ''

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch_flag: '--x64'

          # Linux arm64 — native ARM runner
          - os: ubuntu-24.04-arm
            platform: linux
            arch_flag: '--arm64'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            python3 \
            make \
            g++

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Create .env with secrets
        shell: bash
        run: |
          echo "TWITCH_CLIENT_ID=$TWITCH_CLIENT_ID" >> .env
          echo "TWITCH_CLIENT_SECRET=$TWITCH_CLIENT_SECRET" >> .env
          echo "KICK_CLIENT_ID=$KICK_CLIENT_ID" >> .env
          echo "KICK_CLIENT_SECRET=$KICK_CLIENT_SECRET" >> .env
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          KICK_CLIENT_ID: ${{ secrets.KICK_CLIENT_ID }}
          KICK_CLIENT_SECRET: ${{ secrets.KICK_CLIENT_SECRET }}

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch_flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lurk-buddy-${{ matrix.platform }}-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          draft: true
          generate_release_notes: true
